# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The spec version for this configuration file.
specVersion: v1alpha1

# The command to build your app.
build:
  # Specify the runtime to ensure the correct Node.js version is used.
  runtime: nodejs20
  # The command to run to build your app.
  run: npm run build

# The command to run your app.
run:
  # The command to run to start your app.
  run: npm run start
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

# Environment variables for your backend.
env:
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "studio-7145415565-66e7d.firebasestorage.app"
